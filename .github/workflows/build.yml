name: Build & Push

on:
  push:
    branches: [main]
    paths-ignore: ['helm/**']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VITE_SUPABASE_URL=${{ vars.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ vars.VITE_SUPABASE_ANON_KEY }}
            VITE_WHATSAPP_NUMBER=${{ vars.VITE_WHATSAPP_NUMBER }}

      - name: Update Helm tag
        run: |
          sed -i "s/tag: .*/tag: '1.0.${{ github.run_number }}'/" helm/values-production.yaml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add helm/values-production.yaml
          git commit -m "ci: update tag to 1.0.${{ github.run_number }} [skip ci]"
          git push
