{{- define "base.service" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.base.deployment.port | int }}
      protocol: TCP
  selector:
    app: {{ .Release.Name }}
{{- end }}
